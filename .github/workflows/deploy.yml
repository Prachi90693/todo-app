name: Build and Deploy Todo App

# TRIGGER: run this pipeline when you push to main branch
on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # GitHub creates a fresh Ubuntu VM

    steps:
      # Step 1: Download your code onto the VM
      # The VM is blank — it needs your code to work with
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Python and test the app
      # If your app has a bug, the pipeline stops HERE before deploying
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install and test
        run: |
          pip install -r requirements.txt
          python -c "from app import app; print('App OK')"

      # Step 3: Log in to Docker Hub
      # Uses the secrets you added in GitHub — never shown in logs
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 4: Build the Docker image and push to Docker Hub
      # Docker Hub is the bridge — GitHub builds it, AWS pulls it
      - name: Build and push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/todo-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-app:latest

      # Step 5: SSH into your EC2 server and deploy the new image
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/todo-app:latest
             docker stop todo-app || true   # stop old container (ok if none exists)
            docker rm todo-app || true     # remove old container
            docker run -d --name todo-app -p 5000:5000 \
              ${{ secrets.DOCKER_USERNAME }}/todo-app:latest